kind: Dashboard
metadata:
  name: kubernetes-cilium
  project: kubernetes
spec:
  display:
    name: "Kubernetes – Cilium Networking"
  duration: 1h
  refreshInterval: 30s

  panels:
    # ── Row 1: Agent health stats ──────────────────────────────────────────────
    endpoints-total:
      kind: Panel
      spec:
        display:
          name: Managed Endpoints
          description: "Total number of endpoints (pods) managed by Cilium across all agents."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum(cilium_endpoint_state{endpoint_state="ready"})'

    endpoints-not-ready:
      kind: Panel
      spec:
        display:
          name: Non-Ready Endpoints
          description: "Endpoints not in ready state — regenerating or waiting for policy."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
              steps:
                - color: yellow
                  value: 1
                - color: red
                  value: 5
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum(cilium_endpoint_state{endpoint_state!="ready"})'

    policy-count:
      kind: Panel
      spec:
        display:
          name: Network Policies
          description: "Number of network policies loaded into Cilium."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum(cilium_policy_count)"

    policy-import-errors:
      kind: Panel
      spec:
        display:
          name: Policy Import Errors
          description: "Policies that failed to import — should always be 0."
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
              steps:
                - color: red
                  value: 1
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum(cilium_policy_import_errors_total)"

    # ── Row 2: Endpoint state breakdown ───────────────────────────────────────
    endpoint-states:
      kind: Panel
      spec:
        display:
          name: Endpoint States Over Time
          description: "Breakdown of all endpoints by lifecycle state. Spikes in 'regenerating' mean policy updates are rolling out."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.15
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum by (endpoint_state) (cilium_endpoint_state)"
                  seriesNameFormat: "{{endpoint_state}}"

    endpoint-regen-failures:
      kind: Panel
      spec:
        display:
          name: Endpoint Regeneration Failures
          description: "Failed regenerations mean endpoints did not receive policy updates."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.3
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (pod) (rate(cilium_endpoint_regenerations_total{outcome="fail"}[$__rate_interval]))'
                  seriesNameFormat: "{{pod}}"

    # ── Row 3: Drop & forward rates ───────────────────────────────────────────
    drop-rate:
      kind: Panel
      spec:
        display:
          name: Packet Drop Rate by Reason
          description: "Packets dropped by Cilium's BPF datapath. Policy denied drops are expected; others may indicate misconfigurations."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.25
              palette:
                mode: auto
            yAxis:
              format:
                unit: packets/sec
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum by (reason) (rate(cilium_drop_count_total[$__rate_interval]))"
                  seriesNameFormat: "{{reason}}"

    forward-rate:
      kind: Panel
      spec:
        display:
          name: Packet Forward Rate
          description: "Packets successfully forwarded by direction."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: packets/sec
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum by (direction) (rate(cilium_forward_count_total[$__rate_interval]))"
                  seriesNameFormat: "{{direction}}"

    drop-bytes:
      kind: Panel
      spec:
        display:
          name: Dropped Bytes Rate
          description: "Bytes dropped by the datapath. Sustained drops may indicate a network policy issue."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.2
              palette:
                mode: auto
            yAxis:
              format:
                unit: bytes/sec
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum by (reason) (rate(cilium_drop_bytes_total[$__rate_interval]))"
                  seriesNameFormat: "{{reason}}"

    forward-bytes:
      kind: Panel
      spec:
        display:
          name: Forwarded Bytes Rate
          description: "Bytes forwarded by direction — your actual cluster network throughput via eBPF."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: bytes/sec
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum by (direction) (rate(cilium_forward_bytes_total[$__rate_interval]))"
                  seriesNameFormat: "{{direction}}"

    # ── Row 4: IPAM ────────────────────────────────────────────────────────────
    ipam-allocated:
      kind: Panel
      spec:
        display:
          name: IPAM Allocated IPs per Node
          description: "IP addresses currently allocated to pods per node."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (pod) (cilium_ipam_ips{type="in-use"})'
                  seriesNameFormat: "{{pod}}"

    ipam-available:
      kind: Panel
      spec:
        display:
          name: IPAM Available IPs per Node
          description: "IP addresses still available for allocation. Low values mean pods may fail to schedule."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (pod) (cilium_ipam_ips{type="available"})'
                  seriesNameFormat: "{{pod}}"

    # ── Row 5: Conntrack & BPF maps ───────────────────────────────────────────
    conntrack-gc-runs:
      kind: Panel
      spec:
        display:
          name: Conntrack GC Runs
          description: "Rate of conntrack garbage collection runs by outcome. Failures indicate BPF map pressure."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "sum by (status) (rate(cilium_datapath_conntrack_gc_runs_total[$__rate_interval]))"
                  seriesNameFormat: "{{status}}"

    bpf-map-pressure:
      kind: Panel
      spec:
        display:
          name: BPF Map Pressure
          description: "How full BPF maps are (0–1). Values approaching 1.0 mean the map is nearly full and entries will be dropped."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.2
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: "max by (map_name) (cilium_bpf_map_pressure)"
                  seriesNameFormat: "{{map_name}}"

  layouts:
    - kind: Grid
      spec:
        display:
          title: Agent Health
        items:
          - x: 0
            y: 0
            width: 6
            height: 5
            content:
              $ref: "#/spec/panels/endpoints-total"
          - x: 6
            y: 0
            width: 6
            height: 5
            content:
              $ref: "#/spec/panels/endpoints-not-ready"
          - x: 12
            y: 0
            width: 6
            height: 5
            content:
              $ref: "#/spec/panels/policy-count"
          - x: 18
            y: 0
            width: 6
            height: 5
            content:
              $ref: "#/spec/panels/policy-import-errors"

    - kind: Grid
      spec:
        display:
          title: Endpoints
        items:
          - x: 0
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/endpoint-states"
          - x: 12
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/endpoint-regen-failures"

    - kind: Grid
      spec:
        display:
          title: Datapath – Packet Rates
        items:
          - x: 0
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/drop-rate"
          - x: 12
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/forward-rate"

    - kind: Grid
      spec:
        display:
          title: Datapath – Byte Rates
        items:
          - x: 0
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/drop-bytes"
          - x: 12
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/forward-bytes"

    - kind: Grid
      spec:
        display:
          title: IPAM
        items:
          - x: 0
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/ipam-allocated"
          - x: 12
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/ipam-available"

    - kind: Grid
      spec:
        display:
          title: BPF Maps & Conntrack
        items:
          - x: 0
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/conntrack-gc-runs"
          - x: 12
            y: 0
            width: 12
            height: 9
            content:
              $ref: "#/spec/panels/bpf-map-pressure"
