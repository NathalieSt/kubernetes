kind: Dashboard
metadata:
  name: kubernetes-workloads
  project: kubernetes
spec:
  display:
    name: "Kubernetes – Workloads"
  duration: 1h
  refreshInterval: 30s

  variables:
    - kind: ListVariable
      spec:
        name: namespace
        display:
          name: Namespace
        allowAllValue: true
        allowMultiple: true
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: namespace
            matchers:
              - kube_pod_info
    - kind: ListVariable
      spec:
        name: deployment
        display:
          name: Deployment
        allowAllValue: true
        allowMultiple: true
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            labelName: deployment
            matchers:
              - 'kube_deployment_status_replicas{namespace=~"$namespace"}'

  panels:

    # ── Row 1: Pod phase stats ─────────────────────────────────────────────────
    pods-running:
      kind: Panel
      spec:
        display:
          name: Running Pods
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum(kube_pod_status_phase{phase="Running",namespace=~"$namespace"})'

    pods-pending:
      kind: Panel
      spec:
        display:
          name: Pending Pods
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
              steps:
                - color: yellow
                  value: 1
                - color: red
                  value: 5
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum(kube_pod_status_phase{phase="Pending",namespace=~"$namespace"})'

    pods-failed:
      kind: Panel
      spec:
        display:
          name: Failed Pods
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
              steps:
                - color: red
                  value: 1
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum(kube_pod_status_phase{phase="Failed",namespace=~"$namespace"})'

    pods-crashloop:
      kind: Panel
      spec:
        display:
          name: CrashLoopBackOff
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
            thresholds:
              defaultColor: green
              steps:
                - color: red
                  value: 1
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",namespace=~"$namespace"})'

    # ── Row 2: Deployment replicas ─────────────────────────────────────────────
    deploy-available:
      kind: Panel
      spec:
        display:
          name: Deployment Available Replicas
          description: "Replicas in Ready state per deployment."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'kube_deployment_status_replicas_available{namespace=~"$namespace",deployment=~"$deployment"}'
                  seriesNameFormat: "{{namespace}}/{{deployment}}"

    deploy-unavailable:
      kind: Panel
      spec:
        display:
          name: Deployment Unavailable Replicas
          description: "Replicas NOT in Ready state — should be 0 in steady state."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.3
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'kube_deployment_status_replicas_unavailable{namespace=~"$namespace",deployment=~"$deployment"}'
                  seriesNameFormat: "{{namespace}}/{{deployment}}"

    # ── Row 3: Pod CPU ─────────────────────────────────────────────────────────
    pod-cpu-usage:
      kind: Panel
      spec:
        display:
          name: Pod CPU Usage
          description: "CPU cores consumed per pod (all containers summed)."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!="",namespace=~"$namespace"}[$__rate_interval]))'
                  seriesNameFormat: "{{namespace}}/{{pod}}"

    pod-cpu-throttle:
      kind: Panel
      spec:
        display:
          name: CPU Throttling Ratio
          description: "Fraction of CPU scheduling periods where the container was throttled. >25% is worth investigating."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.2
              palette:
                mode: auto
            yAxis:
              format:
                unit: percent
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: '100 * sum by (namespace, pod, container) (rate(container_cpu_cfs_throttled_periods_total{container!="",namespace=~"$namespace"}[$__rate_interval])) / sum by (namespace, pod, container) (rate(container_cpu_cfs_periods_total{container!="",namespace=~"$namespace"}[$__rate_interval]))'
                  seriesNameFormat: "{{namespace}}/{{pod}}/{{container}}"

    # ── Row 4: Pod Memory ──────────────────────────────────────────────────────
    pod-mem-rss:
      kind: Panel
      spec:
        display:
          name: Pod Memory RSS
          description: "Resident set size memory per pod."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: bytes
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod) (container_memory_rss{container!="",namespace=~"$namespace"})'
                  seriesNameFormat: "{{namespace}}/{{pod}}"

    pod-mem-wss:
      kind: Panel
      spec:
        display:
          name: Pod Memory Working Set
          description: "Working set memory per pod — used by Kubernetes for eviction decisions."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: bytes
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod) (container_memory_working_set_bytes{container!="",namespace=~"$namespace"})'
                  seriesNameFormat: "{{namespace}}/{{pod}}"

    # ── Row 5: Pod Network ─────────────────────────────────────────────────────
    pod-net-recv:
      kind: Panel
      spec:
        display:
          name: Pod Network Receive
          description: "Bytes received per second per pod."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: bytes/sec
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod) (rate(container_network_receive_bytes_total{namespace=~"$namespace"}[$__rate_interval]))'
                  seriesNameFormat: "{{namespace}}/{{pod}}"

    pod-net-send:
      kind: Panel
      spec:
        display:
          name: Pod Network Transmit
          description: "Bytes transmitted per second per pod."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.1
              palette:
                mode: auto
            yAxis:
              format:
                unit: bytes/sec
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod) (rate(container_network_transmit_bytes_total{namespace=~"$namespace"}[$__rate_interval]))'
                  seriesNameFormat: "{{namespace}}/{{pod}}"

    # ── Row 6: Restarts & OOM ──────────────────────────────────────────────────
    container-restarts:
      kind: Panel
      spec:
        display:
          name: Container Restarts (per hour)
          description: "Restart count increases per hour. Sustained restarts indicate a crash loop."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.3
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace=~"$namespace"}[1h]))'
                  seriesNameFormat: "{{namespace}}/{{pod}}/{{container}}"

    container-oom:
      kind: Panel
      spec:
        display:
          name: OOM Kills
          description: "Containers killed by the OOM killer. Each event means memory limits are too low."
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
            visual:
              display: line
              areaOpacity: 0.4
              palette:
                mode: auto
            yAxis:
              format:
                unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  query: 'sum by (namespace, pod, container) (increase(container_oom_events_total{namespace=~"$namespace"}[$__rate_interval]))'
                  seriesNameFormat: "{{namespace}}/{{pod}}/{{container}}"

  layouts:
    - kind: Grid
      spec:
        display:
          title: Pod Overview
        items:
          - x: 0;  y: 0;  width: 6;  height: 5
            content: { $ref: "#/spec/panels/pods-running" }
          - x: 6;  y: 0;  width: 6;  height: 5
            content: { $ref: "#/spec/panels/pods-pending" }
          - x: 12; y: 0;  width: 6;  height: 5
            content: { $ref: "#/spec/panels/pods-failed" }
          - x: 18; y: 0;  width: 6;  height: 5
            content: { $ref: "#/spec/panels/pods-crashloop" }

    - kind: Grid
      spec:
        display:
          title: Deployment Health
        items:
          - x: 0;  y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/deploy-available" }
          - x: 12; y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/deploy-unavailable" }

    - kind: Grid
      spec:
        display:
          title: Pod CPU
        items:
          - x: 0;  y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/pod-cpu-usage" }
          - x: 12; y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/pod-cpu-throttle" }

    - kind: Grid
      spec:
        display:
          title: Pod Memory
        items:
          - x: 0;  y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/pod-mem-rss" }
          - x: 12; y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/pod-mem-wss" }

    - kind: Grid
      spec:
        display:
          title: Pod Network
        items:
          - x: 0;  y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/pod-net-recv" }
          - x: 12; y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/pod-net-send" }

    - kind: Grid
      spec:
        display:
          title: Restarts & OOM Kills
        items:
          - x: 0;  y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/container-restarts" }
          - x: 12; y: 0;  width: 12; height: 9
            content: { $ref: "#/spec/panels/container-oom" }