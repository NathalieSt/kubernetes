name: Generate Manifests

on:
  push:
    branches: [main]
    paths:
      - 'internal/generators/**'
      - 'versions/**'
      - 'pkg/schema/**'
      - 'internal/pkg/utils/**'
  workflow_dispatch:

env:
  FORGEJO_URL: https://code.cluster.netbird.selfhosted
  MANIFESTS_REPO: Nathi/kubernetes

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout generator repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Clone manifests repo
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git clone \
            https://oauth2:${FORGEJO_TOKEN}@${FORGEJO_URL#https://}/${{ env.MANIFESTS_REPO }}.git \
            /tmp/kubernetes-manifests
          git -C /tmp/kubernetes-manifests config user.email "ci-bot@generated"
          git -C /tmp/kubernetes-manifests config user.name "Manifest Generator"

      - name: Link cluster directory into generator workspace
        # Generators write to $GITHUB_WORKSPACE/cluster/...
        # This symlink redirects those writes into the cloned manifests repo.
        run: ln -s /tmp/kubernetes-manifests/cluster ${{ github.workspace }}/cluster

      - name: Run all generators
        run: go run ./cmd/generate-all/main.go --root=${{ github.workspace }}

      - name: Check for changes
        id: diff
        working-directory: /tmp/kubernetes-manifests
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with regenerated manifests
        if: steps.diff.outputs.changed == 'true'
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        working-directory: /tmp/kubernetes-manifests
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BRANCH="generated-manifests/${SHORT_SHA}"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: regenerate manifests from kubernetes-generator@${SHORT_SHA}

          Triggered by push to ${{ github.repository }}@${{ github.sha }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push \
            "https://oauth2:${FORGEJO_TOKEN}@${FORGEJO_URL#https://}/${{ env.MANIFESTS_REPO }}.git" \
            "$BRANCH"

          # Create pull request via Forgejo API
          curl --fail -s -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "${{ env.FORGEJO_URL }}/api/v1/repos/${{ env.MANIFESTS_REPO }}/pulls" \
            -d "$(cat <<EOF
          {
            "title": "chore: regenerate manifests (generator@${SHORT_SHA})",
            "head": "${BRANCH}",
            "base": "main",
            "body": "Automated manifest regeneration.\n\nSource: [${{ github.repository }}@${SHORT_SHA}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )"

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Generated manifests are already up to date — no PR needed."
