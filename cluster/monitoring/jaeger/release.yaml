---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger
spec:
  interval: 24h
  chartRef:
    kind: HelmChart
    name: jaeger-chart
  timeout: 10m
  releaseName: jaeger
  install:
    remediation:
      retries: 3
  values:
    provisionDataStore:
      cassandra: false
      elasticsearch: false
      kafka: false
    userconfig: |
      extensions:
        healthcheckv2:
          use_v2: true
          http:
            endpoint: 0.0.0.0:13133
      
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        jaeger:
          protocols:
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_http:
              endpoint: 0.0.0.0:14268
            thrift_compact:
              endpoint: 0.0.0.0:6831
            thrift_binary:
              endpoint: 0.0.0.0:6832
      
      processors:
        batch:
      
      exporters:
        otlphttp:
          endpoint: http://victoria-traces.victoria-traces.svc.cluster.local:10428/insert/opentelemetry
          tls:
            insecure: true
      
      service:
        extensions: [healthcheckv2]
        pipelines:
          traces:
            receivers: [otlp, jaeger]
            processors: [batch]
            exporters: [otlphttp]
