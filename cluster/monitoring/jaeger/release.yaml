---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger
spec:
  interval: 24h
  chartRef:
    kind: HelmChart
    name: jaeger-chart
  timeout: 10m
  releaseName: jaeger
  install:
    remediation:
      retries: 3
  values:
    allInOne:
      enabled: false
    collector:
      enabled: true
    config:
      exporters:
        otlphttp:
          endpoint: http://victoria-traces.victoria-traces.svc.cluster.local:10428/insert/opentelemetry
      processors:
        batch: {}
      receivers:
        jaeger:
          protocols:
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_http:
              endpoint: 0.0.0.0:14268
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      service:
        extensions:
        - healthcheckv2
        pipelines:
          traces:
            exporters:
            - otlphttp
            processors:
            - batch
            receivers:
            - otlp
            - jaeger
    provisionDataStore:
      cassandra: false
      elasticsearch: false
      kafka: false
    query:
      enabled: false
