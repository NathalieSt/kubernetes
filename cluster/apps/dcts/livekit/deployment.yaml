---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: livekit
    app.kubernetes.io/version: latest
  name: livekit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: livekit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: livekit
        app.kubernetes.io/version: latest
    spec:
      containers:
      - command:
        - /livekit-server
        - --config
        - /etc/livekit.yaml
        - --port
        - "7880"
        - --key-file
        - /etc/livekit-keys.yaml
        image: livekit/livekit-server:latest
        name: livekit
        ports:
        - containerPort: 7880
          name: http
        volumeMounts:
        - mountPath: /etc/livekit.yaml
          subPath: livekit.yaml
          name: livekit-config-volume
        - mountPath: /etc/livekit-keys.yaml
          subPath: livekit-keys.yaml
          name: livekit-key-volume
        env:
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              key: api-key
              name: livekit-secret
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              key: api-secret
              name: livekit-secret
      volumes:
      - name: livekit-config-volume
        configMap:
          name: livekit-config
          defaultMode: 493
      - name: livekit-key-volume
        secret:
          secretName: livekit-secret
          defaultMode: 384
