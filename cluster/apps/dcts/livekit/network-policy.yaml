---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: livekit-networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: livekit
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: netbird
      podSelector:
        matchLabels:
          app.kubernetes.io/name: netbird-router
    ports:
    - port: 7880
      protocol: TCP
    - port: 7881
      protocol: TCP
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: dcts
    ports:
    - port: 7880
      protocol: TCP
  - ports:
    - port: 50000
      endPort: 50005
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - ports:
    - port: 50000
      endPort: 50005
