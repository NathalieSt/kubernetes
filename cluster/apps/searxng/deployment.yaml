---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/version: 2025.8.3-2e62eb5
  name: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/version: 2025.8.3-2e62eb5
    spec:
      containers:
      - image: searxng/searxng:2025.8.3-2e62eb5
        name: searxng
        ports:
        - containerPort: 8080
          name: searxng
        volumeMounts:
        - mountPath: /etc/searxng
          name: configmap-volume
        - mountPath: /usr/local/searxng/searx/templates
          name: templates-pvc-volume
        - mountPath: /usr/local/searxng/searx/static
          name: static-pvc-volume
      volumes:
      - name: configmap-volume
        configMap:
          name: searxng-configmap
      - name: static-pvc-volume
        persistentVolumeClaim:
          claimName: searxng-static-pvc
      - name: templates-pvc-volume
        persistentVolumeClaim:
          claimName: searxng-templates-pvc
