---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/version: v0.107.71
  name: adguard-home
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard-home
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguard-home
        app.kubernetes.io/version: v0.107.71
    spec:
      containers:
      - image: adguard/adguardhome:v0.107.71
        name: adguard-home
        ports:
        - containerPort: 54
          name: dns
        - containerPort: 3000
          name: setup-ui
        - containerPort: 80
          name: web-ui
        volumeMounts:
        - mountPath: /opt/adguardhome/conf
          name: conf-volume
        - mountPath: /opt/adguardhome/work
          name: work-volume
      volumes:
      - name: conf-volume
        persistentVolumeClaim:
          claimName: config-pvc
      - name: work-volume
        persistentVolumeClaim:
          claimName: work-pvc
