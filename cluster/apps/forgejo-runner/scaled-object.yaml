---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: forgejo-runner-scaledobject
spec:
  scaleTargetRef:
    kind: Deployment
    name: forgejo-runner
  minReplicaCount: 0
  cooldownPeriod: 300
  triggers:
    - type: cron
      metadata:
        timezone: Europe/Vienna
        start: 0 9 * * *
        end: 0 22 * * *
        desiredReplicas: "1"
