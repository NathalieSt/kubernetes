---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: audiomuse-ai-worker
    app.kubernetes.io/version: sha256_bffb01b86a4de
  name: audiomuse-ai-worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-ai-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-ai-worker
        app.kubernetes.io/version: sha256_bffb01b86a4de
    spec:
      containers:
      - image: ghcr.io/neptunehub/audiomuse-ai@sha256:bffb01b86a4de0cd793a3064aa7bf20f8e76b535bbb2b8facce5334a9631d807
        name: audiomuse-ai-worker
        ports:
        - containerPort: 8000
          name: worker
        volumeMounts:
        - mountPath: /app/temp_audio
          name: temp-volume
        env:
        - name: SERVICE_TYPE
          value: worker
        - name: CLAP_ENABLED
          value: "false"
        - name: JELLYFIN_USER_ID
          valueFrom:
            secretKeyRef:
              key: userid
              name: jellyfin-creds
        - name: JELLYFIN_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: jellyfin-creds
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: username
              name: postgres-creds-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: postgres-creds-secret
        envFrom:
        - configMapRef:
            name: audiomuse-configmap
      volumes:
      - name: temp-volume
        persistentVolumeClaim:
          claimName: audiomuse-ai-pvc
